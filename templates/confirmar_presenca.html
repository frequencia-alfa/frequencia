{% extends "base.html" %}

{% block content %}
<section class="panel narrow">
    <h2>Confirmar Presenca</h2>
    <p>Turma: <strong>{{ aula["turma_codigo"] }}</strong></p>
    <p>Disciplina: <strong>{{ aula["disciplina_nome"] }}</strong></p>
    <p>Digite seu nome ou matricula. As sugestoes aparecem automaticamente para facilitar no celular.</p>

    <form method="post" class="stack-form">
        <label for="busca" class="field-label">Nome ou matricula</label>
        <input id="busca" placeholder="Comece a digitar seu nome ou matricula" autocomplete="off" required>
        <input id="codigo" name="codigo" type="hidden" required>
        <div id="selecionado" class="helper"></div>
        <ul id="lista" class="search-results"></ul>
        <button type="submit">Confirmar presenca</button>
    </form>
</section>

<script>
const buscaInput = document.getElementById("busca");
const codigoInput = document.getElementById("codigo");
const lista = document.getElementById("lista");
const selecionado = document.getElementById("selecionado");
const form = buscaInput.closest("form");
let ultimoTermoBuscado = "";

function limparLista() {
    lista.innerHTML = "";
}

function selecionarAluno(item) {
    buscaInput.value = item.nome + " (" + item.codigo + ")";
    codigoInput.value = item.codigo;
    selecionado.textContent = "Selecionado: " + item.nome + " - " + item.codigo;
    limparLista();
}

async function buscarAluno() {
    const termo = buscaInput.value.trim();
    ultimoTermoBuscado = termo;
    codigoInput.value = "";
    selecionado.textContent = "";

    if (!termo) {
        limparLista();
        return;
    }

    const resposta = await fetch("/buscar_aluno/{{ aula['turma_id'] }}?q=" + encodeURIComponent(termo));
    const dados = await resposta.json();

    if (buscaInput.value.trim() !== ultimoTermoBuscado) {
        return;
    }

    limparLista();

    dados.dados.forEach((item) => {
        const li = document.createElement("li");
        const button = document.createElement("button");
        button.type = "button";
        button.className = "search-result-button";
        button.innerHTML = "<strong>" + item.nome + "</strong><span>" + item.codigo + "</span>";
        button.onclick = () => selecionarAluno(item);
        li.appendChild(button);
        lista.appendChild(li);
    });
}

buscaInput.addEventListener("input", buscarAluno);
form.addEventListener("submit", () => {
    if (!codigoInput.value.trim()) {
        codigoInput.value = buscaInput.value.trim();
    }
});
</script>
{% endblock %}
