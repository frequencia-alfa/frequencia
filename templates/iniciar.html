{% extends "base.html" %}

{% block content %}
<section class="panel narrow">
    <h2>Iniciar Aula</h2>
    <p>Professor: <strong>{{ professor["nome"] }}</strong></p>
    <p>Turma: <strong>{{ alocacao["turma_codigo"] }}</strong></p>
    <p>Disciplina: <strong>{{ alocacao["disciplina_nome"] }}</strong></p>
    <p>O QR ficará ativo por {{ expiration_minutes }} minutos.</p>
    <form method="post" class="stack-form">
        <button type="submit">Gerar QR Code</button>
    </form>
</section>
{% endblock %}
