{% extends "base.html" %}

{% block content %}
<section class="panel narrow">
    <h2>Login do Professor</h2>
    <form method="post" class="stack-form">
        <input name="email" placeholder="E-mail ou usuário" required>
        <input name="senha" type="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>
    <p class="helper">Administrador: usuário <strong>Administrador</strong> e senha <strong>Frequenciaalfa</strong>.</p>
</section>
{% endblock %}
